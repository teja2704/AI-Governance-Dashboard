name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test And Audit
    runs-on: ubuntu-latest

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    # The current test suite sets DATABASE_URL to a temporary SQLite
    # database, so no PostgreSQL service container is required yet.
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Check dependency consistency
        run: python -m pip check

      - name: Run tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Audit dependencies
        # Fail on any known vulnerability and fail closed if the audit
        # service cannot complete.
        run: python -m pip_audit --strict
